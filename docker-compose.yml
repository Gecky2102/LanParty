services:
  web:
    build: ./wsserver
    ports:
      - "3000:3000"
    environment:
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_ROOT_PASSWORD: cisco
      MYSQL_DATABASE: lanparty
      ADMIN_USER: admin
      ADMIN_PASSWORD: "@dmin!"
    depends_on:
      - mysql
    restart: unless-stopped

  mysql:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: cisco
      MYSQL_DATABASE: lanparty
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped

volumes:
  mysql_data:
